version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: scrum-poker-server
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: scrum-poker-client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server
